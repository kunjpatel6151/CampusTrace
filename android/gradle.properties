org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# === Build Stability Fixes (added to prevent cache corruption & file locking) ===
# Disable the Gradle daemon to prevent file lock contention on Windows
org.gradle.daemon=false
# Disable the Gradle build cache to prevent stale/corrupt cache entries
org.gradle.caching=false
# Disable parallel project execution to avoid concurrent file access issues
org.gradle.parallel=false
# Disable Kotlin incremental compilation to prevent "different roots" errors
kotlin.incremental=false
# Disable file system watching (can cause stale locks on Windows)
org.gradle.vfs.watch=false
